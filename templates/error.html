{% extends "base.html" %}

{% block title %}Error - Cloud Storage{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <h2>⚠️ Error</h2>
        <p class="error-message">{{ error }}</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
            Back to Dashboard
        </a>
        <a href="{{ url_for('login') }}" class="btn btn-secondary">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
